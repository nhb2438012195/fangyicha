server:
  port: 8088

spring:
  application:
    name: fangyicha-backend
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # Spring AI (DeepSeek via OpenAI compatibility)
  ai:
    openai:
      base-url: https://api.deepseek.com
      api-key: sk-049d68581414449aa10226d97f4f67ec
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7
          max-tokens: 1024
      embedding:
        options:
          model: deepseek-embedding

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.fangyicha.entity
  global-config:
    banner: false
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: FangYiCha2024SecretKeyForJWTTokenGenerationMustBe256BitsLong
  expiration: 86400000  # 24小时，单位毫秒

# Knife4j 配置
knife4j:
  enable: true
  production: false
  setting:
    language: zh-CN
    enable-after-script: false
